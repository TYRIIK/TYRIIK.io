<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Марк | Fullscreen Portfolio</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body id="body">
    <div class="bg-overlay"></div>

    <div class="wrapper">
        <header>
            <div class="avatar-container">
                <img src="https://avatars.mds.yandex.net/i?id=d18838be9042994af4c47b2e1d22a553627bff85-4460510-images-thumbs&n=13"
                    alt="Марк" />
            </div>
            <h1>Сап, я Марк</h1>
            <p class="subtitle">Возраст около 16 лет</p>
        </header>

        <main>
            <section class="info-section">
                <p><b>Профессия:</b> Front-end разработчик</p>
                <p><b>Навыки:</b> HTML, CSS, Avalonia, C#</p>
                <p>
                    <b>Обо мне:</b> Я разработчик, умею выполнять базовые и
                    сложные задачи, хорошо ориентируюсь в коде.
                </p>
            </section>

            <div class="content-grid">
                <div class="box">
                    <h3>Контакты</h3>
                    <nav class="links" id="links">
                    </nav>
                </div>

                <div class="box">
                    <h3>Моя херь)</h3>
                    <p class="placeholder">Тут будет скоро моя херь ...</p>
                </div>
            </div>
        </main>
    </div>
    <script>
        let arr = [{ title: "Telegram", href: "https://rt.pornhub.org/" }, { title: "Discord", href: "www.google.com" },]
        let links = document.getElementById("links")
        arr.forEach((item) => {
            let card = document.createElement("div")
            card.innerHTML = `<a href="${item.href}">${item.title}</a>`
            links.appendChild(card)
        })
    </script>
</body>

</html>
